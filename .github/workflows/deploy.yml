name: Deploy to Windows Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # ✅ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Restore
      - name: Restore Dependencies
        run: dotnet restore

      # ✅ Build
      - name: Build Project
        run: dotnet build --configuration Release

      # ✅ Publish (IMPORTANT: use .csproj)
      - name: Publish Application
        run: dotnet publish SampleApi/SampleApi.csproj -c Release -o D:\deploy\app

      # ✅ Backup existing app (safe)
      - name: Backup Existing App
        shell: powershell
        run: |
          $source = "C:\inetpub\wwwroot\sampleApplication"
          $date   = Get-Date -Format "yyyyMMdd_HHmmss"
          $dest   = "D:\backup\sampleApplication_$date"

          if (Test-Path $source) {
            New-Item -ItemType Directory -Path "D:\backup" -Force | Out-Null
            Copy-Item -Path $source -Destination $dest -Recurse -Force
            Write-Host "Backup created at $dest"
          } else {
            Write-Host "No existing app found, skipping backup."
          }

      # ✅ Stop IIS App Pool (avoids file lock)
      - name: Stop App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          $site = Get-Website -Name "sampleApplication"
          Stop-WebAppPool -Name $site.applicationPool

      # ✅ Ensure target folder exists
      - name: Ensure Target Folder Exists
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\sampleApplication"
          if (!(Test-Path $target)) {
            New-Item -ItemType Directory -Path $target -Force | Out-Null
          }

      # ✅ Deploy files (overwrite instead of delete)
      - name: Deploy Files
        shell: powershell
        run: |
          Copy-Item -Path "D:\deploy\app\*" `
                    -Destination "C:\inetpub\wwwroot\sampleApplication" `
                    -Recurse -Force

      # ✅ Start IIS App Pool
      - name: Start App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          $site = Get-Website -Name "sampleApplication"
          Start-WebAppPool -Name $site.applicationPool

      # ✅ Health Check
      - name: Verify Deployment
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri http://localhost -UseBasicParsing -TimeoutSec 10
            if ($response.StatusCode -eq 200) {
              Write-Host "✅ App is running successfully"
            } else {
              Write-Error "❌ Health check failed. Status: $($response.StatusCode)"
              exit 1
            }
          } catch {
            Write-Error "❌ App not reachable: $_"
            exit 1
          }
