name: Deploy to Windows Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Restore
      - name: Restore Dependencies
        run: dotnet restore

      # ✅ Build
      - name: Build Project
        run: dotnet build --configuration Release

      # ✅ Publish
      - name: Publish Application
        run: dotnet publish SampleApi/SampleApi.csproj -c Release -o D:\deploy\app

      # 🔥 NEW STEP — Replace Secrets
      - name: Replace AppSettings Secrets
        shell: powershell
        run: |
          $file = "D:\deploy\app\appsettings.json"

          if (!(Test-Path $file)) {
            Write-Error "appsettings.json not found!"
            exit 1
          }

          Write-Host "Replacing secrets in appsettings.json..."

          $content = Get-Content $file -Raw

          $content = $content.Replace("__DB_CONNECTION_STRING__", "${{ secrets.DB_CONNECTION_STRING }}")
          $content = $content.Replace("__API_KEY__", "${{ secrets.API_KEY }}")
          $content = $content.Replace("__JWT_SECRET__", "${{ secrets.JWT_SECRET }}")

          Set-Content $file $content

          Write-Host "Secrets replaced successfully."

      # ✅ Backup existing app
      - name: Backup Existing App
        shell: powershell
        run: |
          $source = "C:\inetpub\wwwroot\sampleApplication"
          $date   = Get-Date -Format "yyyyMMdd_HHmmss"
          $dest   = "D:\backup\sampleApplication_$date"

          if (Test-Path $source) {
            New-Item -ItemType Directory -Path "D:\backup" -Force | Out-Null
            Copy-Item -Path $source -Destination $dest -Recurse -Force
            Write-Host "Backup created at $dest"
          } else {
            Write-Host "No existing app found, skipping backup."
          }

      # ✅ Stop App Pool (SAFE)
      - name: Stop App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration

          $appPool = "sampleApplication"

          if (!(Test-Path "IIS:\AppPools\$appPool")) {
            Write-Error "App Pool does not exist!"
            exit 1
          }

          $state = (Get-WebAppPoolState $appPool).Value
          Write-Host "Current App Pool State: $state"

          if ($state -eq "Stopped") {
            Write-Host "App Pool already stopped. Skipping."
          } else {
            Write-Host "Stopping App Pool..."
            Stop-WebAppPool -Name $appPool

            $timeout = 30
            while ((Get-WebAppPoolState $appPool).Value -ne "Stopped" -and $timeout -gt 0) {
              Start-Sleep -Seconds 1
              $timeout--
            }

            if ($timeout -eq 0) {
              Write-Error "App Pool did not stop in time"
              exit 1
            }
          }

      # ✅ Ensure target folder exists
      - name: Ensure Target Folder Exists
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\sampleApplication"
          if (!(Test-Path $target)) {
            New-Item -ItemType Directory -Path $target -Force | Out-Null
          }

      # ✅ Deploy files
      - name: Deploy Files
        shell: powershell
        run: |
          Copy-Item -Path "D:\deploy\app\*" `
                    -Destination "C:\inetpub\wwwroot\sampleApplication" `
                    -Recurse -Force

      # ✅ Small wait (IMPORTANT)
      - name: Wait Before Starting App Pool
        shell: powershell
        run: Start-Sleep -Seconds 3

      # ✅ Start App Pool (SAFE)
      - name: Start App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration

          $appPool = "sampleApplication"

          if (!(Test-Path "IIS:\AppPools\$appPool")) {
            Write-Error "App Pool does not exist!"
            exit 1
          }

          $state = (Get-WebAppPoolState $appPool).Value
          Write-Host "Current App Pool State: $state"

          if ($state -eq "Started") {
            Write-Host "App Pool already running. Skipping."
          } else {
            Write-Host "Starting App Pool..."
            Start-WebAppPool -Name $appPool

            $timeout = 30
            while ((Get-WebAppPoolState $appPool).Value -ne "Started" -and $timeout -gt 0) {
              Start-Sleep -Seconds 1
              $timeout--
            }

            if ($timeout -eq 0) {
              Write-Error "App Pool did not start in time"
              exit 1
            }
          }

      # ✅ Health Check
      - name: Verify Deployment
        shell: powershell
        run: |
          Start-Sleep -Seconds 5

          try {
            $response = Invoke-WebRequest -Uri http://localhost -UseBasicParsing -TimeoutSec 10

            if ($response.StatusCode -eq 200) {
              Write-Host "✅ App is running successfully"
            } else {
              Write-Error "❌ Health check failed. Status: $($response.StatusCode)"
              exit 1
            }
          } catch {
            Write-Error "❌ App not reachable: $_"
            exit 1
          }