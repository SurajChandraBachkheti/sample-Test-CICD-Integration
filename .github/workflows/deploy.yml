name: Deploy to Windows Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Restore Dependencies
        shell: powershell
        run: dotnet restore

      - name: Build Project
        shell: powershell
        run: dotnet build --configuration Release

      - name: Publish Application
        # ✅ Output to D:\deploy\app since runner works on D drive
        shell: powershell
        run: dotnet publish -c Release -o D:\deploy\app

      - name: Backup Existing App
        shell: powershell
        run: |
          $source = "C:\inetpub\wwwroot\sampleApplication"
          $date   = Get-Date -Format "yyyyMMdd_HHmmss"
          $dest   = "D:\backup\sampleApplication_$date"
          if (Test-Path $source) {
            New-Item -ItemType Directory -Path "D:\backup" -Force | Out-Null
            Copy-Item -Path $source -Destination $dest -Recurse -Force
            Write-Host "Backup created at $dest"
          } else {
            Write-Host "No existing app folder found, skipping backup."
          }

      - name: Clean Target Folder
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\sampleApplication"
          if (Test-Path $target) {
            Remove-Item -Path $target -Recurse -Force
            Write-Host "Cleaned: $target"
          }
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Write-Host "Created fresh folder: $target"

      - name: Deploy Files to IIS
        # ✅ Source is D:\deploy\app, target is C:\inetpub\wwwroot\YourApp
        shell: powershell
        run: |
          $source = "D:\deploy\app\*"
          $target = "C:\inetpub\wwwroot\sampleApplication"
          Copy-Item -Path $source -Destination $target -Recurse -Force
          Write-Host "Files deployed successfully."

      - name: Verify Deployment
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri http://localhost -UseBasicParsing -TimeoutSec 10
            if ($response.StatusCode -eq 200) {
              Write-Host "Health check passed. App is running."
            } else {
              Write-Error "Health check failed. Status: $($response.StatusCode)"
              exit 1
            }
          } catch {
            Write-Error "Health check failed. Could not reach the app: $_"
            exit 1
          }