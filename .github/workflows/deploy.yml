name: Deploy to Windows Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Restore
      - name: Restore Dependencies
        run: dotnet restore

      # ✅ Build
      - name: Build Project
        run: dotnet build --configuration Release

      # ✅ Publish
      - name: Publish Application
        run: dotnet publish SampleApi/SampleApi.csproj -c Release -o D:\deploy\app

      # ✅ Replace Secrets
      - name: Replace AppSettings Secrets
        shell: powershell
        run: |
          $file = "D:\deploy\app\appsettings.json"

          if (!(Test-Path $file)) {
            Write-Error "appsettings.json not found!"
            exit 1
          }

          $content = Get-Content $file -Raw

          $content = $content.Replace("__DB_CONNECTION_STRING__", "${{ secrets.DB_CONNECTION_STRING }}")
          $content = $content.Replace("__API_KEY__", "${{ secrets.API_KEY }}")
          $content = $content.Replace("__JWT_SECRET__", "${{ secrets.JWT_SECRET }}")

          Set-Content $file $content

          Write-Host "Secrets replaced successfully."

      # 🔥 Backup + Keep Last 3 Only
      - name: Backup Existing App (Keep Last 3)
        shell: powershell
        run: |
          $source = "C:\inetpub\wwwroot\sampleApplication"
          $backupRoot = "D:\backup"
          $date = Get-Date -Format "yyyyMMdd_HHmmss"
          $dest = "$backupRoot\sampleApplication_$date"

          # Ensure backup root exists
          if (!(Test-Path $backupRoot)) {
            New-Item -ItemType Directory -Path $backupRoot -Force | Out-Null
          }

          # Create backup
          if (Test-Path $source) {
            Copy-Item -Path $source -Destination $dest -Recurse -Force
            Write-Host "Backup created at $dest"
          } else {
            Write-Host "No existing app found, skipping backup."
          }

          # 🔥 Keep only latest 3 backups (based on folder name)
          Write-Host "Cleaning old backups, keeping only latest 3..."

          $backups = Get-ChildItem -Path $backupRoot -Directory |
            Where-Object { $_.Name -like "sampleApplication_*" } |
            Sort-Object Name -Descending

          if ($backups.Count -le 3) {
            Write-Host "3 or fewer backups found. No cleanup needed."
          } else {
            $backupsToDelete = $backups | Select-Object -Skip 3

            foreach ($backup in $backupsToDelete) {
              Write-Host "Deleting old backup: $($backup.FullName)"
              Remove-Item $backup.FullName -Recurse -Force
            }
          }

      # ✅ Stop App Pool
      - name: Stop App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          $appPool = "sampleApplication"

          if (!(Test-Path "IIS:\AppPools\$appPool")) {
            Write-Error "App Pool does not exist!"
            exit 1
          }

          $state = (Get-WebAppPoolState $appPool).Value

          if ($state -ne "Stopped") {
            Stop-WebAppPool -Name $appPool

            $timeout = 30
            while ((Get-WebAppPoolState $appPool).Value -ne "Stopped" -and $timeout -gt 0) {
              Start-Sleep -Seconds 1
              $timeout--
            }
          } else {
            Write-Host "App Pool already stopped."
          }

      # ✅ Ensure folder
      - name: Ensure Target Folder Exists
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\sampleApplication"
          if (!(Test-Path $target)) {
            New-Item -ItemType Directory -Path $target -Force | Out-Null
          }

      # ✅ Deploy
      - name: Deploy Files
        shell: powershell
        run: |
          Copy-Item -Path "D:\deploy\app\*" `
                    -Destination "C:\inetpub\wwwroot\sampleApplication" `
                    -Recurse -Force

      # ✅ Wait
      - name: Wait Before Starting App Pool
        shell: powershell
        run: Start-Sleep -Seconds 3

      # ✅ Start App Pool
      - name: Start App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          $appPool = "sampleApplication"

          if (!(Test-Path "IIS:\AppPools\$appPool")) {
            Write-Error "App Pool does not exist!"
            exit 1
          }

          $state = (Get-WebAppPoolState $appPool).Value

          if ($state -ne "Started") {
            Start-WebAppPool -Name $appPool

            $timeout = 30
            while ((Get-WebAppPoolState $appPool).Value -ne "Started" -and $timeout -gt 0) {
              Start-Sleep -Seconds 1
              $timeout--
            }
          } else {
            Write-Host "App Pool already running."
          }

      # ✅ Health Check
      - name: Verify Deployment
        shell: powershell
        run: |
          Start-Sleep -Seconds 5

          try {
            $response = Invoke-WebRequest -Uri http://localhost -UseBasicParsing -TimeoutSec 10

            if ($response.StatusCode -eq 200) {
              Write-Host "✅ App is running successfully"
            } else {
              Write-Error "❌ Health check failed"
              exit 1
            }
          } catch {
            Write-Error "❌ App not reachable: $_"
            exit 1
          }